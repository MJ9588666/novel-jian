<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剑底幽冥</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Serif SC', 'Songti SC', serif; background: #1a1a2e; color: #e0dcd0; line-height: 1.8; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
header { text-align: center; padding: 60px 0 40px; border-bottom: 1px solid #3a3a5e; }
h1 { font-size: 2.5em; color: #c9a85c; margin-bottom: 10px; letter-spacing: 8px; }
.subtitle { color: #8a8aa0; font-size: 0.9em; letter-spacing: 4px; }
.intro { margin: 40px 0; padding: 20px; background: #16213e; border-left: 3px solid #c9a85c; border-radius: 4px; }
.chapter-list { margin: 30px 0; }
.chapter { padding: 15px 20px; border-bottom: 1px solid #2a2a4e; display: flex; align-items: center; gap: 15px; }
.chapter.free { color: #c9a85c; }
.chapter.locked { color: #5a5a70; }
.tag { font-size: 0.75em; padding: 2px 8px; border-radius: 3px; }
.free-tag { background: #c9a85c22; color: #c9a85c; border: 1px solid #c9a85c44; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>剑底幽冥</h1>
<p class="subtitle">古风仙侠 · 悬疑探案</p>
</header>
<div class="intro">
<p>大幽王朝末年，十二州割据，血月将至，幽冥之门即将开启。</p>
<p>镇北侯府庶子沈渊，天生阴阳眼，能看到世间最隐秘的真相——也看到了不该看到的东西。</p>
<p>一具没有魂魄的尸体，一枚藏着求救信的铜钱，一场跨越十二州的巨大阴谋。</p>
</div>
<div class="chapter-list" id="chapters">
<p style="color: #8a8aa0;">加载中...</p>
</div>
</div>
<script>
fetch('chapters/index.json').then(r=>r.json()).then(data => {
  const list = document.getElementById('chapters');
  list.innerHTML = data.map(c => 
    '<div class="chapter ' + (c.free ? 'free' : 'locked') + '">' +
    '<span>第' + c.num + '章 · ' + c.title + '</span>' +
    '<span class="tag ' + (c.free ? 'free-tag' : '') + '">' + (c.free ? '免费' : '🔒') + '</span>' +
    '</div>'
  ).join('');
});
</script>
</body>
</html>
